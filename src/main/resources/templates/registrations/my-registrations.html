<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::main})}">
<head>
    <title>Đăng ký của tôi - EventHub</title>
</head>
<body>
<main>
<h2 class="fw-bold mb-4"><i class="bi bi-bookmark-check me-2"></i>Đăng ký của tôi</h2>

<div class="card shadow-sm" th:if="${!registrations.isEmpty()}">
    <div class="table-responsive">
        <table class="table mb-0">
            <thead>
                <tr>
                    <th>Sự kiện</th>
                    <th>Ngày tổ chức</th>
                    <th>Ngày đăng ký</th>
                    <th>Trạng thái</th>
                    <th>Thao tác</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="reg : ${registrations}">
                    <td th:with="event=${eventMap[reg.eventId]}">
                        <div class="fw-semibold" th:text="${event != null && event.title != null ? event.title : 'N/A'}"></div>
                        <small class="text-muted" th:text="${event != null ? event.location : ''}"></small>
                    </td>
                    <td th:with="event=${eventMap[reg.eventId]}">
                        <small th:if="${event != null && event.startDate != null}"
                               th:text="${#temporals.format(event.startDate, 'dd/MM/yyyy HH:mm')}"></small>
                    </td>
                    <td>
                        <small class="text-muted" th:text="${#temporals.format(reg.registeredAt, 'dd/MM/yyyy HH:mm')}"></small>
                    </td>
                    <td>
                        <span class="badge bg-success" th:if="${reg.status == 'CONFIRMED'}">
                            <i class="bi bi-check-circle me-1"></i>Đã xác nhận
                        </span>
                        <span class="badge bg-secondary" th:if="${reg.status == 'CANCELLED'}">
                            <i class="bi bi-x-circle me-1"></i>Đã hủy
                        </span>
                    </td>
                    <td>
                        <div class="d-flex gap-1">
                            <a th:href="@{/events/{id}(id=${reg.eventId})}" class="btn btn-sm btn-outline-secondary">
                                <i class="bi bi-eye"></i>
                            </a>
                            <form th:if="${reg.status == 'CONFIRMED'}"
                                  th:action="@{/registrations/{id}/cancel(id=${reg.id})}" method="post"
                                  onsubmit="return confirm('Xác nhận hủy đăng ký?')">
                                <button type="submit" class="btn btn-sm btn-outline-danger">
                                    <i class="bi bi-x-circle me-1"></i>Hủy
                                </button>
                            </form>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<div class="text-center py-5" th:if="${registrations.isEmpty()}">
    <i class="bi bi-bookmark-x fs-1 text-muted"></i>
    <h5 class="mt-3 text-muted">Bạn chưa đăng ký sự kiện nào</h5>
    <a th:href="@{/events}" class="btn btn-primary mt-2">
        <i class="bi bi-calendar-event me-1"></i>Khám phá sự kiện
    </a>
</div>
</main>
</body>
</html>
