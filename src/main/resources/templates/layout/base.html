<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:fragment="layout(title, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:replace="${title}">EventHub</title>

    <!-- Bootstrap 5.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <!-- Custom CSS -->
    <link th:href="@{/css/custom.css}" rel="stylesheet">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">
            <i class="bi bi-calendar-event-fill me-1"></i> EventHub
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/events}">
                        <i class="bi bi-grid-3x3-gap"></i> Sự kiện
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ORGANIZER')">
                    <a class="nav-link" th:href="@{/organizer/my-events}">
                        <i class="bi bi-calendar-plus"></i> Sự kiện của tôi
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ATTENDEE')">
                    <a class="nav-link" th:href="@{/my-registrations}">
                        <i class="bi bi-bookmark-check"></i> Đã đăng ký
                    </a>
                </li>
                <li class="nav-item dropdown" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">
                        <i class="bi bi-shield-check"></i> Quản trị
                    </a>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" th:href="@{/admin/dashboard}">
                            <i class="bi bi-speedometer2 me-1"></i>Dashboard</a></li>
                        <li><a class="dropdown-item" th:href="@{/admin/users}">
                            <i class="bi bi-people me-1"></i>Quản lý User</a></li>
                        <li><a class="dropdown-item" th:href="@{/admin/reports}">
                            <i class="bi bi-bar-chart me-1"></i>Báo cáo</a></li>
                    </ul>
                </li>
            </ul>

            <!-- User info & auth -->
            <ul class="navbar-nav ms-auto align-items-center">
                <li class="nav-item" sec:authorize="isAnonymous()">
                    <a class="nav-link" th:href="@{/auth/login}">
                        <i class="bi bi-box-arrow-in-right"></i> Đăng nhập
                    </a>
                </li>
                <li class="nav-item ms-2" sec:authorize="isAnonymous()">
                    <a class="btn btn-outline-light btn-sm" th:href="@{/auth/register}">Đăng ký</a>
                </li>
                <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
                    <a class="nav-link dropdown-toggle d-flex align-items-center gap-1" href="#" data-bs-toggle="dropdown">
                        <i class="bi bi-person-circle fs-5"></i>
                        <span sec:authentication="name">User</span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end shadow">
                        <li>
                            <form th:action="@{/auth/logout}" method="post">
                                <button class="dropdown-item text-danger" type="submit">
                                    <i class="bi bi-box-arrow-right me-1"></i> Đăng xuất
                                </button>
                            </form>
                        </li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- FLASH MESSAGES -->
<div class="container mt-3" id="flash-messages">
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show d-flex align-items-center" role="alert">
        <i class="bi bi-check-circle-fill me-2 fs-5"></i>
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close ms-auto" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show d-flex align-items-center" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2 fs-5"></i>
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close ms-auto" data-bs-dismiss="alert"></button>
    </div>
</div>

<!-- MAIN CONTENT -->
<main class="container my-4" th:replace="${content}">
    <!-- Content injected here -->
</main>

<!-- FOOTER -->
<footer class="text-white text-center py-4 mt-5">
    <div class="container">
        <div class="d-flex justify-content-center align-items-center gap-2 mb-1">
            <i class="bi bi-calendar-event-fill"></i>
            <strong>EventHub</strong>
        </div>
        <small class="text-white-50">© 2025 EventHub. All rights reserved.</small>
    </div>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Auto-dismiss flash messages after 5s -->
<script>
setTimeout(() => {
    document.querySelectorAll('#flash-messages .alert').forEach(el => {
        const bsAlert = bootstrap.Alert.getOrCreateInstance(el);
        bsAlert.close();
    });
}, 5000);
</script>

</body>
</html>
