<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lỗi - EventHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/custom.css}" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="text-center">
        <div class="fs-1 fw-bold text-primary opacity-25" th:text="${statusCode ?: '500'}"></div>
        <i class="bi bi-exclamation-triangle-fill text-warning" style="font-size:4rem;"></i>
        <h3 class="mt-3 fw-bold">Rất tiếc, đã xảy ra lỗi!</h3>
        <p class="text-muted" th:text="${errorMessage ?: 'Trang bạn yêu cầu không tồn tại hoặc bạn không có quyền truy cập.'}"></p>
        <div class="d-flex justify-content-center gap-2 mt-3">
            <a href="/events" class="btn btn-primary">
                <i class="bi bi-house me-1"></i>Về trang chủ
            </a>
            <button onclick="history.back()" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left me-1"></i>Quay lại
            </button>
        </div>
    </div>
</div>
</body>
</html>
