<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::main})}">
<head>
    <title>Quản lý User - EventHub</title>
</head>
<body>
<main>
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold mb-0"><i class="bi bi-people me-2"></i>Quản lý người dùng</h2>
</div>

<!-- Search & Filter -->
<div class="card shadow-sm mb-4">
    <div class="card-body">
        <form th:action="@{/admin/users}" method="get" class="row g-2 align-items-center">
            <div class="col-md-5">
                <div class="input-group">
                    <span class="input-group-text bg-white border-end-0">
                        <i class="bi bi-search text-muted"></i>
                    </span>
                    <input type="text" class="form-control border-start-0" name="keyword"
                           th:value="${keyword}" placeholder="Tìm theo tên hoặc email...">
                </div>
            </div>
            <div class="col-md-3">
                <select class="form-select" name="role">
                    <option value="">-- Tất cả role --</option>
                    <option th:each="r : ${roles}" th:value="${r.name()}" th:text="${r.name()}"
                            th:selected="${r.name() == selectedRole}"></option>
                </select>
            </div>
            <div class="col-md-2">
                <button type="submit" class="btn btn-primary w-100">
                    <i class="bi bi-funnel me-1"></i>Lọc
                </button>
            </div>
            <div class="col-md-2">
                <a th:href="@{/admin/users}" class="btn btn-outline-secondary w-100">
                    <i class="bi bi-arrow-counterclockwise me-1"></i>Reset
                </a>
            </div>
        </form>
    </div>
</div>

<!-- Users Table -->
<div class="card shadow-sm" th:if="${!users.isEmpty()}">
    <div class="table-responsive">
        <table class="table mb-0">
            <thead>
                <tr>
                    <th>Người dùng</th>
                    <th>Email</th>
                    <th>Role</th>
                    <th>Trạng thái</th>
                    <th>Ngày tạo</th>
                    <th>Thao tác</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="user : ${users.content}">
                    <td>
                        <div class="d-flex align-items-center gap-2">
                            <div class="rounded-circle d-flex align-items-center justify-content-center text-white fw-bold"
                                 style="width:36px;height:36px;min-width:36px;background:linear-gradient(135deg,#0d6efd,#6610f2);font-size:0.85rem;"
                                 th:text="${#strings.toUpperCase(#strings.substring(user.fullName, 0, 1))}">A</div>
                            <span class="fw-semibold" th:text="${user.fullName}"></span>
                        </div>
                    </td>
                    <td><small th:text="${user.email}"></small></td>
                    <td>
                        <span class="badge bg-danger" th:if="${user.role.name() == 'ADMIN'}">ADMIN</span>
                        <span class="badge bg-primary" th:if="${user.role.name() == 'ORGANIZER'}">ORGANIZER</span>
                        <span class="badge bg-success" th:if="${user.role.name() == 'ATTENDEE'}">ATTENDEE</span>
                    </td>
                    <td>
                        <span class="badge bg-success" th:if="${user.enabled}">
                            <i class="bi bi-check2 me-1"></i>Active
                        </span>
                        <span class="badge bg-secondary" th:unless="${user.enabled}">
                            <i class="bi bi-x me-1"></i>Disabled
                        </span>
                    </td>
                    <td><small class="text-muted" th:text="${user.createdAt != null ? #temporals.format(user.createdAt, 'dd/MM/yyyy') : '-'}"></small></td>
                    <td>
                        <div class="d-flex gap-1 flex-wrap">
                            <!-- Toggle enabled -->
                            <form th:action="@{/admin/users/{id}/toggle(id=${user.id})}" method="post">
                                <button type="submit" class="btn btn-sm"
                                        th:classappend="${user.enabled} ? 'btn-outline-warning' : 'btn-outline-success'"
                                        th:title="${user.enabled} ? 'Vô hiệu hoá' : 'Kích hoạt'">
                                    <i class="bi" th:classappend="${user.enabled} ? 'bi-pause-circle' : 'bi-play-circle'"></i>
                                </button>
                            </form>
                            <!-- Change role -->
                            <div class="dropdown">
                                <button class="btn btn-sm btn-outline-info dropdown-toggle" type="button" data-bs-toggle="dropdown">
                                    <i class="bi bi-person-gear"></i>
                                </button>
                                <ul class="dropdown-menu">
                                    <li th:each="r : ${roles}">
                                        <form th:action="@{/admin/users/{id}/role(id=${user.id})}" method="post">
                                            <input type="hidden" name="role" th:value="${r.name()}">
                                            <button type="submit" class="dropdown-item"
                                                    th:classappend="${r == user.role} ? 'active'"
                                                    th:text="${r.name()}"></button>
                                        </form>
                                    </li>
                                </ul>
                            </div>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<div class="text-center py-5" th:if="${users.isEmpty()}">
    <i class="bi bi-people fs-1 text-muted"></i>
    <h5 class="mt-3 text-muted">Không tìm thấy người dùng nào</h5>
</div>

<!-- Pagination -->
<nav th:if="${users.totalPages > 1}" class="mt-3 d-flex justify-content-center">
    <ul class="pagination">
        <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
            <a class="page-link" th:href="@{/admin/users(keyword=${keyword},role=${selectedRole},page=${currentPage-1})}">
                <i class="bi bi-chevron-left"></i>
            </a>
        </li>
        <li class="page-item" th:each="i : ${#numbers.sequence(0, users.totalPages - 1)}"
            th:classappend="${i == currentPage} ? 'active'">
            <a class="page-link" th:href="@{/admin/users(keyword=${keyword},role=${selectedRole},page=${i})}"
               th:text="${i + 1}"></a>
        </li>
        <li class="page-item" th:classappend="${currentPage == users.totalPages - 1} ? 'disabled'">
            <a class="page-link" th:href="@{/admin/users(keyword=${keyword},role=${selectedRole},page=${currentPage+1})}">
                <i class="bi bi-chevron-right"></i>
            </a>
        </li>
    </ul>
</nav>
</main>
</body>
</html>
