<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::main})}">
<head>
    <title th:text="${event != null ? 'Sửa sự kiện' : 'Tạo sự kiện'} + ' - EventHub'">Form sự kiện</title>
</head>
<body>
<main>
<div class="container" style="max-width:860px;">
    <div class="d-flex align-items-center gap-2 mb-4">
        <a th:href="@{/organizer/my-events}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left"></i>
        </a>
        <h2 class="fw-bold mb-0" th:text="${event != null ? 'Chỉnh sửa sự kiện' : 'Tạo sự kiện mới'}">Form</h2>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-4">
            <form th:action="${event != null ? '/events/' + event.id + '/edit' : '/events/create'}"
                  th:object="${eventDto}" method="post" enctype="multipart/form-data">

                <!-- Title -->
                <div class="mb-3">
                    <label class="form-label fw-semibold"><i class="bi bi-type me-1"></i>Tiêu đề sự kiện *</label>
                    <input type="text" th:field="*{title}" class="form-control"
                           th:classappend="${#fields.hasErrors('title')} ? 'is-invalid'"
                           placeholder="Nhập tiêu đề hấp dẫn...">
                    <div class="invalid-feedback" th:errors="*{title}"></div>
                </div>

                <!-- Description -->
                <div class="mb-3">
                    <label class="form-label fw-semibold"><i class="bi bi-card-text me-1"></i>Mô tả *</label>
                    <textarea th:field="*{description}" class="form-control" rows="5"
                              th:classappend="${#fields.hasErrors('description')} ? 'is-invalid'"
                              placeholder="Mô tả chi tiết về sự kiện..."></textarea>
                    <div class="invalid-feedback" th:errors="*{description}"></div>
                </div>

                <!-- Location -->
                <div class="mb-3">
                    <label class="form-label fw-semibold"><i class="bi bi-geo-alt me-1"></i>Địa điểm *</label>
                    <input type="text" th:field="*{location}" class="form-control"
                           th:classappend="${#fields.hasErrors('location')} ? 'is-invalid'"
                           placeholder="Địa điểm tổ chức sự kiện">
                    <div class="invalid-feedback" th:errors="*{location}"></div>
                </div>

                <!-- Dates -->
                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <label class="form-label fw-semibold"><i class="bi bi-calendar-event me-1"></i>Ngày bắt đầu *</label>
                        <input type="datetime-local" th:field="*{startDate}" class="form-control"
                               id="startDate"
                               th:classappend="${#fields.hasErrors('startDate')} ? 'is-invalid'">
                        <div class="invalid-feedback" th:errors="*{startDate}"></div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold"><i class="bi bi-calendar-x me-1"></i>Ngày kết thúc *</label>
                        <input type="datetime-local" th:field="*{endDate}" class="form-control"
                               id="endDate"
                               th:classappend="${#fields.hasErrors('endDate')} ? 'is-invalid'">
                        <div class="invalid-feedback" th:errors="*{endDate}"></div>
                    </div>
                </div>

                <!-- Capacity -->
                <div class="mb-3">
                    <label class="form-label fw-semibold"><i class="bi bi-people me-1"></i>Số chỗ tối đa</label>
                    <input type="number" th:field="*{maxCapacity}" class="form-control" min="0"
                           placeholder="0 = Không giới hạn">
                    <div class="form-text">Nhập 0 để không giới hạn số người tham dự</div>
                </div>

                <!-- Tags -->
                <div class="mb-3">
                    <label class="form-label fw-semibold"><i class="bi bi-tags me-1"></i>Danh mục / Tags</label>
                    <input type="text" id="tagsInput" name="tagsInput" class="form-control"
                           th:value="${eventDto.tags != null ? #strings.arrayJoin(eventDto.tags.toArray(), ',') : ''}"
                           placeholder="Ví dụ: Âm nhạc, Công nghệ, Thể thao">
                    <div class="form-text">Phân cách bằng dấu phẩy</div>
                </div>

                <!-- Banner Image -->
                <div class="mb-3">
                    <label class="form-label fw-semibold"><i class="bi bi-image me-1"></i>Ảnh banner (JPG/PNG, tối đa 5MB)</label>
                    <input type="file" class="form-control" name="bannerFile" id="bannerInput"
                           accept="image/jpeg,image/png">
                    <!-- Preview existing banner -->
                    <div class="mt-2" th:if="${eventDto.bannerImagePath != null}">
                        <div class="position-relative d-inline-block">
                            <img th:src="@{'/uploads/' + ${eventDto.bannerImagePath}}"
                                 id="bannerPreview" style="max-height:200px;border-radius:8px;border:2px solid #e2e8f0;" alt="Preview">
                        </div>
                    </div>
                    <div id="previewBox" class="mt-2 d-none" th:unless="${eventDto.bannerImagePath != null}">
                        <img id="bannerPreview" style="max-height:200px;border-radius:8px;border:2px solid #e2e8f0;" alt="Preview">
                    </div>
                </div>

                <!-- Status -->
                <div class="mb-4">
                    <label class="form-label fw-semibold"><i class="bi bi-broadcast me-1"></i>Trạng thái</label>
                    <div class="d-flex gap-4">
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="status"
                                   id="statusDraft" value="DRAFT"
                                   th:checked="${eventDto.status == null || eventDto.status == 'DRAFT'}">
                            <label class="form-check-label" for="statusDraft">
                                <i class="bi bi-pencil me-1 text-secondary"></i>
                                <strong>Lưu nháp</strong> <small class="text-muted">(chỉ bạn thấy)</small>
                            </label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="status"
                                   id="statusPublished" value="PUBLISHED"
                                   th:checked="${eventDto.status == 'PUBLISHED'}">
                            <label class="form-check-label" for="statusPublished">
                                <i class="bi bi-broadcast me-1 text-success"></i>
                                <strong>Đăng công khai</strong> <small class="text-muted">(mọi người thấy ngay)</small>
                            </label>
                        </div>
                    </div>
                </div>

                <!-- Submit -->
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary px-4">
                        <i class="bi bi-check2-circle me-1"></i>
                        <span th:text="${event != null ? 'Cập nhật sự kiện' : 'Tạo sự kiện'}">Submit</span>
                    </button>
                    <a th:href="@{/organizer/my-events}" class="btn btn-outline-secondary">Hủy</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
// Preview banner image before upload
document.getElementById('bannerInput').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = (ev) => {
            document.getElementById('bannerPreview').src = ev.target.result;
            document.getElementById('previewBox').classList.remove('d-none');
        };
        reader.readAsDataURL(file);
    }
});

// Validate endDate > startDate on form submit
document.querySelector('form').addEventListener('submit', function(e) {
    const start = document.getElementById('startDate').value;
    const end = document.getElementById('endDate').value;
    if (start && end && new Date(end) <= new Date(start)) {
        e.preventDefault();
        alert('Ngày kết thúc phải sau ngày bắt đầu!');
    }
});
</script>
</main>
</body>
</html>
