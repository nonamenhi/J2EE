<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout/base :: layout(~{::title}, ~{::main})}">
<head>
    <title>Sự kiện - EventHub</title>
</head>
<body>
<main>
    <!-- Page Header -->
    <div class="page-header text-white mb-0" style="margin-top:-1.5rem;">
        <div class="container">
            <h1 class="mb-1"><i class="bi bi-calendar-event me-2"></i>Khám phá Sự Kiện</h1>
            <p class="mb-0 opacity-75">Tìm kiếm và tham gia các sự kiện thú vị</p>
        </div>
    </div>

    <div class="container mt-4">
        <!-- Search & Filter -->
        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <form th:action="@{/events}" method="get" class="row g-2 align-items-center">
                    <div class="col-md-5">
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0">
                                <i class="bi bi-search text-muted"></i>
                            </span>
                            <input type="text" class="form-control border-start-0" name="keyword"
                                   th:value="${keyword}" placeholder="Tìm tên sự kiện...">
                        </div>
                    </div>
                    <div class="col-md-4">
                        <select class="form-select" name="tag">
                            <option value="">-- Tất cả danh mục --</option>
                            <option th:each="t : ${allTags}" th:value="${t}" th:text="${t}"
                                    th:selected="${t == selectedTag}"></option>
                        </select>
                    </div>
                    <div class="col-md-3 d-flex gap-2">
                        <button type="submit" class="btn btn-primary flex-fill">
                            <i class="bi bi-funnel me-1"></i>Lọc
                        </button>
                        <a th:href="@{/events}" class="btn btn-outline-secondary">
                            <i class="bi bi-arrow-counterclockwise"></i>
                        </a>
                    </div>
                </form>
            </div>
        </div>

        <!-- ORGANIZER button -->
        <div class="d-flex justify-content-between align-items-center mb-3" sec:authorize="hasRole('ORGANIZER')">
            <p class="text-muted mb-0" th:text="${events.totalElements + ' sự kiện tìm thấy'}"></p>
            <a th:href="@{/events/create}" class="btn btn-success">
                <i class="bi bi-plus-circle me-1"></i>Tạo sự kiện mới
            </a>
        </div>
        <div class="mb-3" sec:authorize="!hasRole('ORGANIZER')">
            <p class="text-muted" th:text="${events.totalElements + ' sự kiện tìm thấy'}"></p>
        </div>

        <!-- Events Grid -->
        <div class="row g-4" th:if="${!events.isEmpty()}">
            <div class="col-md-4" th:each="event : ${events.content}">
                <div class="card h-100 shadow-sm">
                    <!-- Banner -->
                    <div th:if="${event.bannerImagePath != null}">
                        <img th:src="@{'/uploads/' + ${event.bannerImagePath}}"
                             class="card-img-top" style="height:180px;object-fit:cover;" alt="Banner">
                    </div>
                    <div th:unless="${event.bannerImagePath != null}" class="banner-placeholder">
                        <i class="bi bi-calendar-event"></i>
                    </div>

                    <div class="card-body d-flex flex-column">
                        <!-- Tags -->
                        <div class="event-tags mb-2" th:if="${event.tags != null && !event.tags.isEmpty()}">
                            <span class="badge bg-primary bg-opacity-10 text-primary me-1"
                                  th:each="tag : ${event.tags}" th:text="${tag}"></span>
                        </div>

                        <h5 class="card-title fw-bold" th:text="${event.title}">Tên sự kiện</h5>

                        <div class="text-muted small mb-1">
                            <i class="bi bi-calendar3 me-1 text-primary"></i>
                            <span th:text="${#temporals.format(event.startDate, 'dd/MM/yyyy HH:mm')}"></span>
                        </div>
                        <div class="text-muted small mb-2">
                            <i class="bi bi-geo-alt me-1 text-danger"></i>
                            <span th:text="${event.location}"></span>
                        </div>

                        <!-- Progress bar -->
                        <div th:if="${event.maxCapacity > 0}" class="mb-2">
                            <div class="d-flex justify-content-between">
                                <small class="text-muted">Còn lại</small>
                                <small class="fw-semibold"
                                       th:text="${event.maxCapacity - event.currentAttendees} + '/' + ${event.maxCapacity}"></small>
                            </div>
                            <div class="progress mt-1" style="height:6px;">
                                <div class="progress-bar bg-success" role="progressbar"
                                     th:style="'width:' + ${100 - (event.currentAttendees * 100 / event.maxCapacity)} + '%'"></div>
                            </div>
                        </div>
                        <div th:unless="${event.maxCapacity > 0}" class="mb-2">
                            <small class="text-success"><i class="bi bi-infinity me-1"></i>Không giới hạn chỗ</small>
                        </div>

                        <a th:href="@{/events/{id}(id=${event.id})}"
                           class="btn btn-primary btn-sm mt-auto">
                            Xem chi tiết <i class="bi bi-arrow-right ms-1"></i>
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <!-- Empty state -->
        <div class="text-center py-5" th:if="${events.isEmpty()}">
            <i class="bi bi-calendar-x fs-1 text-muted"></i>
            <h5 class="mt-3 text-muted">Không có sự kiện nào</h5>
            <p class="text-muted">Thử thay đổi bộ lọc hoặc từ khóa tìm kiếm</p>
        </div>

        <!-- Pagination -->
        <nav th:if="${events.totalPages > 1}" class="mt-4 d-flex justify-content-center">
            <ul class="pagination">
                <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                    <a class="page-link" th:href="@{/events(keyword=${keyword},tag=${selectedTag},page=${currentPage-1})}">
                        <i class="bi bi-chevron-left"></i>
                    </a>
                </li>
                <li class="page-item" th:each="i : ${#numbers.sequence(0, events.totalPages - 1)}"
                    th:classappend="${i == currentPage} ? 'active'">
                    <a class="page-link" th:href="@{/events(keyword=${keyword},tag=${selectedTag},page=${i})}"
                       th:text="${i + 1}"></a>
                </li>
                <li class="page-item" th:classappend="${currentPage == events.totalPages - 1} ? 'disabled'">
                    <a class="page-link" th:href="@{/events(keyword=${keyword},tag=${selectedTag},page=${currentPage+1})}">
                        <i class="bi bi-chevron-right"></i>
                    </a>
                </li>
            </ul>
        </nav>
    </div>
</main>
</body>
</html>
