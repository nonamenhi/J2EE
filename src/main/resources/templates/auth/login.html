<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - EventHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/custom.css}" rel="stylesheet">
</head>
<body class="auth-wrapper">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="card auth-card p-4">
                <!-- Logo -->
                <div class="text-center mb-4">
                    <div class="auth-logo mb-2">
                        <i class="bi bi-calendar-event-fill"></i> EventHub
                    </div>
                    <p class="text-muted">Đăng nhập để quản lý sự kiện của bạn</p>
                </div>

                <!-- Error / Success -->
                <div th:if="${param.error}" class="alert alert-danger d-flex align-items-center" role="alert">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i>
                    Email hoặc mật khẩu không chính xác!
                </div>
                <div th:if="${param.logout}" class="alert alert-success d-flex align-items-center" role="alert">
                    <i class="bi bi-check-circle-fill me-2"></i>
                    Đăng xuất thành công!
                </div>
                <div th:if="${successMessage}" class="alert alert-success d-flex align-items-center">
                    <i class="bi bi-check-circle-fill me-2"></i>
                    <span th:text="${successMessage}"></span>
                </div>

                <!-- Login Form -->
                <form th:action="@{/auth/login}" method="post">
                    <div class="mb-3">
                        <label for="username" class="form-label fw-semibold">
                            <i class="bi bi-envelope me-1"></i>Email
                        </label>
                        <input type="email" id="username" name="username"
                               class="form-control form-control-lg"
                               placeholder="email@example.com" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label fw-semibold">
                            <i class="bi bi-lock me-1"></i>Mật khẩu
                        </label>
                        <div class="input-group">
                            <input type="password" id="password" name="password"
                                   class="form-control form-control-lg"
                                   placeholder="••••••••" required>
                            <button class="btn btn-outline-secondary" type="button"
                                    onclick="togglePassword('password', this)">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                    </div>
                    <div class="mb-4 form-check">
                        <input type="checkbox" class="form-check-input" id="remember-me" name="remember-me">
                        <label class="form-check-label text-muted" for="remember-me">Ghi nhớ đăng nhập</label>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg w-100 fw-semibold">
                        <i class="bi bi-box-arrow-in-right me-1"></i> Đăng nhập
                    </button>
                </form>

                <hr class="my-4">
                <p class="text-center text-muted mb-0">
                    Chưa có tài khoản?
                    <a th:href="@{/auth/register}" class="fw-semibold">Đăng ký ngay</a>
                </p>
            </div>

            <!-- Demo credentials hint -->
            <div class="card mt-3 border-0 bg-transparent">
                <div class="card-body py-2 text-center">
                    <small class="text-muted">
                        Demo: <code>admin@event.com / admin123</code>
                    </small>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
function togglePassword(id, btn) {
    const input = document.getElementById(id);
    if (input.type === 'password') {
        input.type = 'text';
        btn.innerHTML = '<i class="bi bi-eye-slash"></i>';
    } else {
        input.type = 'password';
        btn.innerHTML = '<i class="bi bi-eye"></i>';
    }
}
</script>
</body>
</html>
