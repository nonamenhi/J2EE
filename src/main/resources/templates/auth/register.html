<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - EventHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/custom.css}" rel="stylesheet">
</head>
<body class="auth-wrapper">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card auth-card p-4">
                <div class="text-center mb-4">
                    <div class="auth-logo mb-2">
                        <i class="bi bi-calendar-event-fill"></i> EventHub
                    </div>
                    <p class="text-muted">Tạo tài khoản để bắt đầu</p>
                </div>

                <form th:action="@{/auth/register}" th:object="${userDto}" method="post">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">
                            <i class="bi bi-person me-1"></i>Họ và tên
                        </label>
                        <input type="text" th:field="*{fullName}"
                               class="form-control form-control-lg"
                               th:classappend="${#fields.hasErrors('fullName')} ? 'is-invalid'"
                               placeholder="Nguyễn Văn A">
                        <div class="invalid-feedback" th:errors="*{fullName}"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">
                            <i class="bi bi-envelope me-1"></i>Email
                        </label>
                        <input type="email" th:field="*{email}"
                               class="form-control form-control-lg"
                               th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                               placeholder="email@example.com">
                        <div class="invalid-feedback" th:errors="*{email}"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">
                            <i class="bi bi-lock me-1"></i>Mật khẩu
                        </label>
                        <div class="input-group">
                            <input type="password" th:field="*{password}"
                                   class="form-control form-control-lg"
                                   th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"
                                   placeholder="Ít nhất 6 ký tự">
                            <button class="btn btn-outline-secondary" type="button"
                                    onclick="togglePassword('password', this)">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                        <div class="invalid-feedback" th:errors="*{password}"></div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">
                            <i class="bi bi-lock-fill me-1"></i>Xác nhận mật khẩu
                        </label>
                        <div class="input-group">
                            <input type="password" th:field="*{confirmPassword}"
                                   class="form-control form-control-lg"
                                   th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid'"
                                   placeholder="Nhập lại mật khẩu">
                            <button class="btn btn-outline-secondary" type="button"
                                    onclick="togglePassword('confirmPassword', this)">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                        <div class="invalid-feedback" th:errors="*{confirmPassword}"></div>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg w-100 fw-semibold">
                        <i class="bi bi-person-plus me-1"></i> Tạo tài khoản
                    </button>
                </form>

                <hr class="my-4">
                <p class="text-center text-muted mb-0">
                    Đã có tài khoản?
                    <a th:href="@{/auth/login}" class="fw-semibold">Đăng nhập</a>
                </p>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
function togglePassword(id, btn) {
    const input = document.getElementById(id);
    if (input.type === 'password') {
        input.type = 'text';
        btn.innerHTML = '<i class="bi bi-eye-slash"></i>';
    } else {
        input.type = 'password';
        btn.innerHTML = '<i class="bi bi-eye"></i>';
    }
}
</script>
</body>
</html>
